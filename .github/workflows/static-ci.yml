name: 🛡️ Static HTML CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: 🔍 Lint HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HTML Hint
        run: |
          npx htmlhint "**/*.html" || echo "Linting issues found, but continuing..."
